name: tomato_manager
description: FreshTomato Router Manager - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Charts & graphs
  fl_chart: ^0.66.2

  # Notifications
  flutter_local_notifications: ^17.1.2

  # UI components
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Network info
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
