name: tomato_manager
description: FreshTomato Router Manager - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.2.3

  # Charts & graphs
  fl_chart: ^0.66.2

  # Notifications (pin versi stabil)
  flutter_local_notifications: ^16.3.3

  # UI components
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Network info (pin versi yang API-nya stabil)
  connectivity_plus: ^5.0.2

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
