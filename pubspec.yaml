name: tomato_manager
description: FreshTomato Router Manager - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Charts & graphs
  fl_chart: ^0.68.0

  # VPN
  openvpn_flutter: ^1.3.3

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Background tasks
  workmanager: ^0.5.2

  # UI components
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lucide_icons: ^0.0.9
  badges: ^3.1.2
  pull_to_refresh: ^2.0.0

  # Network info
  network_info_plus: ^5.0.3
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  assets:
    - assets/images/
