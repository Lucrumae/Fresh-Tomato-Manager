name: Build Tomato Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.tomatomanager --project-name tomato_manager /tmp/scaffold
          # Copy our source files over the scaffold
          cp -r lib/* /tmp/scaffold/lib/
          cp pubspec.yaml /tmp/scaffold/pubspec.yaml
          cp android/app/src/main/AndroidManifest.xml /tmp/scaffold/android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        working-directory: /tmp/scaffold
        run: flutter pub get

      - name: Build APK
        working-directory: /tmp/scaffold
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-android
          path: /tmp/scaffold/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.tomatomanager --project-name tomato_manager /tmp/scaffold
          cp -r lib/* /tmp/scaffold/lib/
          cp pubspec.yaml /tmp/scaffold/pubspec.yaml

      - name: Install dependencies
        working-directory: /tmp/scaffold
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: /tmp/scaffold/ios
        run: pod install --repo-update

      - name: Build iOS
        working-directory: /tmp/scaffold
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p /tmp/scaffold/build/ios/ipa
          cd /tmp/scaffold/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r /tmp/scaffold/build/ios/ipa/TomatoManager.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-ios
          path: /tmp/scaffold/build/ios/ipa/TomatoManager.ipa
          retention-days: 30
