name: Build Tomato Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Scaffold + copy sources
        run: |
          flutter create --org com.tomatomanager --project-name tomato_manager /tmp/scaffold
          rm -rf /tmp/scaffold/lib
          cp -r lib /tmp/scaffold/lib
          cp pubspec.yaml /tmp/scaffold/pubspec.yaml
          cp android/app/src/main/AndroidManifest.xml /tmp/scaffold/android/app/src/main/AndroidManifest.xml
          mkdir -p /tmp/scaffold/android/app/src/main/res/xml
          cp android/app/src/main/res/xml/network_security_config.xml /tmp/scaffold/android/app/src/main/res/xml/
          cp android/app/src/main/res/xml/file_paths.xml /tmp/scaffold/android/app/src/main/res/xml/
          # Copy app icons
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p /tmp/scaffold/android/app/src/main/res/mipmap-$dpi
            cp android/app/src/main/res/mipmap-$dpi/ic_launcher.png /tmp/scaffold/android/app/src/main/res/mipmap-$dpi/ 2>/dev/null || true
            cp android/app/src/main/res/mipmap-$dpi/ic_launcher_round.png /tmp/scaffold/android/app/src/main/res/mipmap-$dpi/ 2>/dev/null || true
          done

      - run: flutter pub get
        working-directory: /tmp/scaffold

      - name: Build APK
        run: flutter build apk --release
        working-directory: /tmp/scaffold

      - uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-android
          path: /tmp/scaffold/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Scaffold + copy sources
        run: |
          flutter create --org com.tomatomanager --project-name tomato_manager /tmp/scaffold
          rm -rf /tmp/scaffold/lib
          cp -r lib /tmp/scaffold/lib
          cp pubspec.yaml /tmp/scaffold/pubspec.yaml
          cp ios_podfile_patch.py /tmp/scaffold/ios_podfile_patch.py

      - run: flutter pub get
        working-directory: /tmp/scaffold

      - name: Fix deployment target + patch Podfile
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' /tmp/scaffold/ios/Runner.xcodeproj/project.pbxproj || true
          python3 /tmp/scaffold/ios_podfile_patch.py /tmp/scaffold/ios/Podfile

      - run: pod install --repo-update
        working-directory: /tmp/scaffold/ios

      - run: flutter build ios --simulator --no-codesign
        working-directory: /tmp/scaffold

      - name: Create IPA
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -r /tmp/scaffold/build/ios/iphonesimulator/Runner.app /tmp/ipa/Payload/
          cd /tmp/ipa && zip -r TomatoManager.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-ios
          path: /tmp/ipa/TomatoManager.ipa
          retention-days: 30
