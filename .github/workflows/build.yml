name: Build Tomato Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Scaffold + copy sources
        run: |
          flutter create --org com.tomatomanager --project-name tomato_manager /tmp/scaffold
          rm -rf /tmp/scaffold/lib
          cp -r lib /tmp/scaffold/lib
          cp pubspec.yaml /tmp/scaffold/pubspec.yaml
          # Android customizations
          cp android/app/src/main/AndroidManifest.xml \
             /tmp/scaffold/android/app/src/main/AndroidManifest.xml
          mkdir -p /tmp/scaffold/android/app/src/main/res/xml
          cp android/app/src/main/res/xml/network_security_config.xml \
             /tmp/scaffold/android/app/src/main/res/xml/
          cp android/app/src/main/res/xml/file_paths.xml \
             /tmp/scaffold/android/app/src/main/res/xml/

      - run: flutter pub get
        working-directory: /tmp/scaffold

      - name: Build APK
        working-directory: /tmp/scaffold
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-android
          path: /tmp/scaffold/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Scaffold + copy sources
        run: |
          flutter create --org com.tomatomanager --project-name tomato_manager /tmp/scaffold
          rm -rf /tmp/scaffold/lib
          cp -r lib /tmp/scaffold/lib
          cp pubspec.yaml /tmp/scaffold/pubspec.yaml

      - run: flutter pub get
        working-directory: /tmp/scaffold
      - name: Set iOS deployment target + inject Podfile post_install
        run: |
          cd /tmp/scaffold/ios
          # Bump Runner deployment target
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g" Runner.xcodeproj/project.pbxproj || true
          # Inject post_install hook into Podfile to fix all pod targets
          cat >> Podfile << 'PODEOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
      config.build_settings['SWIFT_SUPPRESS_WARNINGS'] = 'YES'
      config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
    end
  end
end
PODEOF
      - run: pod install --repo-update
        working-directory: /tmp/scaffold/ios
      - run: flutter build ios --simulator --no-codesign
        working-directory: /tmp/scaffold

      - name: Create IPA
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -r /tmp/scaffold/build/ios/iphonesimulator/Runner.app /tmp/ipa/Payload/
          cd /tmp/ipa && zip -r TomatoManager.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-ios
          path: /tmp/ipa/TomatoManager.ipa
          retention-days: 30
