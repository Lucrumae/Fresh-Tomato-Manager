name: Build Tomato Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # bisa trigger manual dari GitHub UI

jobs:

  # ─────────────────────────────────────────────
  # BUILD ANDROID APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30


  # ─────────────────────────────────────────────
  # BUILD iOS IPA (butuh Mac runner)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no codesign - untuk testing)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/TomatoManager.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tomato-manager-ios
          path: build/ios/ipa/TomatoManager.ipa
          retention-days: 30
